services:
  api:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - type: bind
        source: ${HOME}/.aws
        target: /app/.aws
        read_only: true
    environment:
      HOME: /app
      AWS_PROFILE: ${AWS_PROFILE:-default}
      AWS_CONFIG_FILE: /app/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /app/.aws/credentials
